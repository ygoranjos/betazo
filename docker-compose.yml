services:
  # PostgreSQL 15
  postgres:
    image: postgres:15-alpine
    container_name: betazo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - betazo_network
    ports:
      - "5432:5432" # Expondo porta para acesso externo (opcional, pode ser omitido para isolamento total)

  # PgBouncer - Connection Pooler
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: betazo_pgbouncer
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      LISTEN_PORT: 6432
      POOL_MODE: transaction # Modo transaction: libera conexão após cada query
      MAX_CLIENT_CONN: 1000 # Máximo de clientes simultâneos (NestJS instances)
      DEFAULT_POOL_SIZE: 20 # Conexões reais abertas com o PostgreSQL
      AUTH_TYPE: plain # PgBouncer verifica senha em texto puro do cliente
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - betazo_network

  # Redis 7
  redis:
    image: redis:7-alpine
    container_name: betazo_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"
    networks:
      - betazo_network

  # Apache Kafka 3.9 - KRaft mode (sem Zookeeper)
  kafka:
    image: apache/kafka:3.9.0
    container_name: betazo_kafka
    restart: unless-stopped
    environment:
      # KRaft: broker e controller no mesmo nó (dev/staging)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Listeners
      # PLAINTEXT  → comunicação interna entre containers
      # CONTROLLER → eleição KRaft (interno)
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Cluster ID fixo para KRaft (necessário na imagem oficial)
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}

      # Tópicos e retenção
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3 # 3 partições = paralelismo nos workers
      KAFKA_LOG_RETENTION_HOURS: 168 # Retenção de 7 dias
      KAFKA_LOG_SEGMENT_BYTES: 1073741824 # Segmentos de 1 GB
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - betazo_network

  # Migrate - roda as migrations e encerra
  migrate:
    build:
      context: ./backend
      target: migrate
    container_name: betazo_migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - betazo_network
    restart: "no"

  # Auth Service - porta 3000
  auth-service:
    build:
      context: ./backend
      target: runner
      args:
        APP_NAME: auth-service
    container_name: betazo_auth
    env_file: ./backend/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - betazo_network
    restart: unless-stopped

  # API Gateway - porta 3001
  api-gateway:
    build:
      context: ./backend
      target: runner
      args:
        APP_NAME: api-gateway
    container_name: betazo_api_gateway
    env_file: ./backend/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - betazo_network
    restart: unless-stopped

  # Betting Service - porta 3003
  betting-service:
    build:
      context: ./backend
      target: runner
      args:
        APP_NAME: betting-service
    container_name: betazo_betting
    env_file: ./backend/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - betazo_network
    restart: unless-stopped

  # Live Odds Service - porta 3002
  live-odds-service:
    build:
      context: ./backend
      target: runner
      args:
        APP_NAME: live-odds-service
    container_name: betazo_live_odds
    env_file: ./backend/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - betazo_network
    restart: unless-stopped

# Volumes - dados persistentes entre restarts
volumes:
  postgres_data:
  redis_data:
  kafka_data:

# Rede interna isolada - todos os serviços NestJS se conectam aqui
networks:
  betazo_network:
    driver: bridge

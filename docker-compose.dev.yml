# Override para desenvolvimento local
# Uso: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Adiciona:
#  - Portas expostas ao host para acesso direto
#  - Listener EXTERNAL do Kafka para NestJS rodando fora do Docker
#  - Kafka UI para observabilidade

services:

  postgres:
    ports:
      - "5432:5432"

  pgbouncer:
    ports:
      - "6432:6432"

  redis:
    ports:
      - "6379:6379"

  kafka:
    environment:
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
    ports:
      - "9092:9092"
      - "9094:9094"

  # Kafka UI - apenas em desenvolvimento
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: betazo_kafka_ui
    restart: unless-stopped
    environment:
      KAFKA_CLUSTERS_0_NAME: betazo-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - betazo_network
